name: Release Build

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'App to build'
        required: true
        type: choice
        options:
          - explorer
          - copilot
      version_name:
        description: 'Version name (e.g., 1.0.0)'
        required: true
        default: '1.0.0'
      version_code:
        description: 'Version code (integer)'
        required: true
        default: '1'
      create_release:
        description: 'Create GitHub Release'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode upload keystore
        env:
          UPLOAD_KEYSTORE_BASE64: ${{ secrets[format('{0}_UPLOAD_KEYSTORE_BASE64', inputs.app == 'explorer' && 'EDGELAB' || 'COPILOT')] }}
        run: |
          mkdir -p signing
          printf '%s' "$UPLOAD_KEYSTORE_BASE64" | base64 -d > signing/upload.keystore
          echo "=== Upload keystore info ==="
          ls -l signing/upload.keystore
          file signing/upload.keystore

      - name: Decode google-services.json
        if: inputs.app == 'explorer'
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: printf '%s' "$GOOGLE_SERVICES_JSON" | base64 -d > app/explorer/google-services.json

      - name: Set up HuggingFace OAuth
        run: echo "HF_CLIENT_ID=${{ secrets.HF_CLIENT_ID }}" >> $GITHUB_ENV

      - name: Update version in build.gradle.kts
        run: |
          BUILD_FILE="app/${{ inputs.app }}/build.gradle.kts"
          sed -i "s/versionCode = [0-9]\+/versionCode = ${{ inputs.version_code }}/" "$BUILD_FILE"
          sed -i "s/versionName = \"[^\"]*\"/versionName = \"${{ inputs.version_name }}\"/" "$BUILD_FILE"
          echo "Updated version to code=${{ inputs.version_code }}, name=${{ inputs.version_name }}"
          grep -E "versionCode|versionName" "$BUILD_FILE"

      - name: Run tests
        run: ./gradlew test

      - name: Build release AAB
        env:
          KEYSTORE_FILE: signing/upload.keystore
          KEYSTORE_PASSWORD: ${{ secrets[format('{0}_UPLOAD_KEYSTORE_PASSWORD', inputs.app == 'explorer' && 'EDGELAB' || 'COPILOT')] }}
          KEY_ALIAS: ${{ secrets[format('{0}_UPLOAD_KEY_ALIAS', inputs.app == 'explorer' && 'EDGELAB' || 'COPILOT')] }}
          KEY_PASSWORD: ${{ secrets[format('{0}_UPLOAD_KEY_PASSWORD', inputs.app == 'explorer' && 'EDGELAB' || 'COPILOT')] }}
        run: ./gradlew :app:${{ inputs.app }}:bundleRelease

      - name: Build release APK
        env:
          KEYSTORE_FILE: signing/upload.keystore
          KEYSTORE_PASSWORD: ${{ secrets[format('{0}_UPLOAD_KEYSTORE_PASSWORD', inputs.app == 'explorer' && 'EDGELAB' || 'COPILOT')] }}
          KEY_ALIAS: ${{ secrets[format('{0}_UPLOAD_KEY_ALIAS', inputs.app == 'explorer' && 'EDGELAB' || 'COPILOT')] }}
          KEY_PASSWORD: ${{ secrets[format('{0}_UPLOAD_KEY_PASSWORD', inputs.app == 'explorer' && 'EDGELAB' || 'COPILOT')] }}
        run: ./gradlew :app:${{ inputs.app }}:assembleRelease

      - name: Rename artifacts
        run: |
          mv app/${{ inputs.app }}/build/outputs/bundle/release/${{ inputs.app }}-release.aab \
             app/${{ inputs.app }}/build/outputs/bundle/release/${{ inputs.app }}-v${{ inputs.version_name }}.aab
          mv app/${{ inputs.app }}/build/outputs/apk/release/${{ inputs.app }}-release.apk \
             app/${{ inputs.app }}/build/outputs/apk/release/${{ inputs.app }}-v${{ inputs.version_name }}.apk

      - name: Size reporting
        run: |
          echo "=== Artifact Sizes ==="
          ls -lh app/${{ inputs.app }}/build/outputs/bundle/release/${{ inputs.app }}-v${{ inputs.version_name }}.aab
          ls -lh app/${{ inputs.app }}/build/outputs/apk/release/${{ inputs.app }}-v${{ inputs.version_name }}.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.app }}-release-aab
          path: app/${{ inputs.app }}/build/outputs/bundle/release/${{ inputs.app }}-v${{ inputs.version_name }}.aab
          retention-days: 30

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.app }}-release-apk
          path: app/${{ inputs.app }}/build/outputs/apk/release/${{ inputs.app }}-v${{ inputs.version_name }}.apk
          retention-days: 30

      - name: Create GitHub Release
        if: ${{ inputs.create_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.app }}-v${{ inputs.version_name }}
          name: ${{ inputs.app }} v${{ inputs.version_name }}
          draft: true
          generate_release_notes: true
          files: |
            app/${{ inputs.app }}/build/outputs/bundle/release/${{ inputs.app }}-v${{ inputs.version_name }}.aab
            app/${{ inputs.app }}/build/outputs/apk/release/${{ inputs.app }}-v${{ inputs.version_name }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
